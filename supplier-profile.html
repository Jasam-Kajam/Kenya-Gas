<!-- Main Content -->

<div class="col-lg-9">

<h2 class="fw-bold mb-4">

<i class="bi bi-building text-success"></i>

Business Profile

</h2>

<div class="card shadow-sm">

<div class="card-body">

<form id="supplierProfileForm">

<!-- Business Logo -->

<div class="text-center mb-4">

<img
id="businessLogoPreview"
src="https://via.placeholder.com/150?text=Logo"
class="rounded-circle border"
width="150"
height="150"
style="object-fit:cover;">

<div class="mt-3">

<input
type="file"
id="businessLogo"
class="form-control"
accept="image/*">

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
Business Name
</label>

<input
type="text"
id="businessName"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Owner Name
</label>

<input
type="text"
id="ownerName"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Phone Number
</label>

<input
type="tel"
id="phoneNumber"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Email
</label>

<input
type="email"
id="email"
class="form-control"
readonly>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
County
</label>

<select
id="county"
class="form-select"
required>

<option value="">
Select County
</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Town
</label>

<select
id="town"
class="form-select"
required>

<option value="">
Select Town
</option>

</select>

</div>

<div class="col-md-12 mb-3">

<label class="form-label">
Business Address
</label>

<textarea
id="address"
class="form-control"
rows="3"></textarea>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Business Permit Number
</label>

<input
type="text"
id="permitNumber"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Verification Status
</label>

<input
type="text"
id="verificationStatus"
class="form-control"
value="Pending Verification"
readonly>

</div>

</div>

<div class="mt-4">

<button
type="submit"
class="btn btn-success">

<i class="bi bi-save"></i>

Save Business Profile

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>
