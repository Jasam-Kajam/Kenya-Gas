<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | Kenya Gas</title>

    <meta name="description"
          content="Login to your Kenya Gas account to order LPG gas, manage deliveries and suppliers.">

    <meta name="keywords"
          content="Kenya Gas, LPG, Login, Gas Delivery">

    <meta name="author"
          content="Kenya Gas">

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <!-- Custom CSS -->

    <link rel="stylesheet"
          href="assets/css/auth.css">

</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-6 col-xl-5">

<div class="login-card shadow-lg border-0 rounded-4">

<div class="card-body p-4 p-md-5">

<div class="text-center mb-4">

<h1 class="logo text-success fw-bold">

🔥 Kenya Gas

</h1>

<p class="text-muted">

Welcome back! Sign in to continue.

</p>

</div>

<form id="loginForm" novalidate>

<div class="mb-3">

<label
for="email"
class="form-label">

Email Address

</label>

<input
type="email"
id="email"
class="form-control"
placeholder="Enter your email"
autocomplete="email"
required>

<div class="invalid-feedback">

Please enter a valid email.

</div>

</div>

<div class="mb-3">

<label
for="password"
class="form-label">

Password

</label>

<div class="input-group">

<input
type="password"
id="password"
class="form-control"
placeholder="Enter your password"
autocomplete="current-password"
required>

<button
class="btn btn-outline-secondary"
type="button"
id="togglePassword"
aria-label="Show password">

<i class="bi bi-eye"></i>

</button>

</div>

</div>
<div class="d-flex justify-content-between align-items-center mb-4">

    <div class="form-check">

        <input
            class="form-check-input"
            type="checkbox"
            id="remember">

        <label
            class="form-check-label"
            for="remember">

            Remember Me

        </label>

    </div>

    <a
        href="forgot-password.html"
        class="text-decoration-none">

        Forgot Password?

    </a>

</div>

<button
    id="loginBtn"
    type="submit"
    class="btn btn-primary btn-lg w-100">

    <span
        id="loginSpinner"
        class="spinner-border spinner-border-sm me-2 d-none"
        role="status"
        aria-hidden="true">

    </span>

    <span id="loginText">

        Login

    </span>

</button>

<div class="text-center my-4">

    <span class="text-muted">

        OR

    </span>

</div>

<button
    type="button"
    id="googleSignIn"
    class="btn btn-outline-dark btn-lg w-100">

    <i class="bi bi-google me-2"></i>

    Continue with Google

</button>

</form>

<hr class="my-4"><div class="text-center">

    <p class="mb-3">

        Don't have an account?

    </p>

    <a
        href="register.html"
        class="btn btn-success btn-lg w-100 mb-3">

        Register as Customer

    </a>

    <a
        href="supplier-register.html"
        class="btn btn-warning btn-lg w-100">

        Become a Supplier

    </a>

</div>

<div class="text-center mt-4">

    <a
        href="index.html"
        class="text-decoration-none">

        <i class="bi bi-arrow-left"></i>

        Back to Home

    </a>

</div>

</div>

</div>

</div>

</div>

</div>

<!-- ======================================================
Toast Notification
======================================================= -->

<div class="toast-container position-fixed top-0 end-0 p-3">

    <div
        id="appToast"
        class="toast align-items-center border-0"
        role="alert"
        aria-live="assertive"
        aria-atomic="true">

        <div class="d-flex">

            <div
                id="toastMessage"
                class="toast-body">

                Welcome back to Kenya Gas.

            </div>

            <button
                type="button"
                class="btn-close me-2 m-auto"
                data-bs-dismiss="toast"
                aria-label="Close">

            </button>

        </div>

    </div>

</div>

<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<!-- Authentication -->

<script type="module" src="assets/js/auth.js"></script>

</body>

</html>
