<h2 class="fw-bold mb-4">

<i class="bi bi-box-seam text-success"></i>

Manage Gas Products

</h2>





<!-- Add Product Card -->


<div class="card shadow-sm mb-4">


<div class="card-header bg-success text-white">

<h5 class="mb-0">

Add New LPG Product

</h5>

</div>



<div class="card-body">


<form id="productForm">


<div class="row">


<div class="col-md-6 mb-3">

<label class="form-label">
Cylinder Size
</label>


<select 
class="form-select"
id="cylinderSize"
required>


<option value="">
Select Size
</option>

<option>
6kg LPG Cylinder
</option>

<option>
13kg LPG Cylinder
</option>

<option>
22kg LPG Cylinder
</option>

<option>
50kg LPG Cylinder
</option>


</select>


</div>





<div class="col-md-6 mb-3">

<label class="form-label">
Price (KES)
</label>


<input 
type="number"
id="price"
class="form-control"
placeholder="Enter price"
required>


</div>




<div class="col-md-6 mb-3">

<label class="form-label">
Available Stock
</label>


<input 
type="number"
id="stock"
class="form-control"
placeholder="Number available"
required>


</div>





<div class="col-md-6 mb-3">

<label class="form-label">
Product Image
</label>


<input 
type="file"
id="productImage"
class="form-control"
accept="image/*">


</div>



</div>





<button 
class="btn btn-success"
type="submit">

<i class="bi bi-plus-circle"></i>

Add Product

</button>


</form>


</div>


</div>







<!-- Inventory Table -->


<div class="card shadow-sm">


<div class="card-header">

<h5 class="mb-0">

Your Products

</h5>


</div>



<div class="card-body">


<div class="table-responsive">


<table class="table table-bordered align-middle">


<thead class="table-success">


<tr>

<th>
Image
</th>


<th>
Cylinder
</th>


<th>
Price
</th>


<th>
Stock
</th>


<th>
Status
</th>


<th>
Actions
</th>


</tr>


</thead>



<tbody id="productsTable">


<tr>

<td colspan="6"
class="text-center">

Loading products...

</td>

</tr>


</tbody>



</table>


</div>


</div>


</div>
