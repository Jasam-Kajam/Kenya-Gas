<!-- Wallet Content -->


<div class="col-lg-9">


<h2 class="fw-bold mb-4">

<i class="bi bi-wallet2 text-success"></i>

Supplier Wallet

</h2>






<!-- Wallet Cards -->


<div class="row g-3 mb-4">


<div class="col-md-4">


<div class="card shadow-sm text-center">


<div class="card-body">


<i class="bi bi-cash-stack fs-2 text-success"></i>


<h6 class="mt-2">
Total Sales
</h6>


<h3 id="totalSales">

KES 0

</h3>


</div>


</div>


</div>







<div class="col-md-4">


<div class="card shadow-sm text-center">


<div class="card-body">


<i class="bi bi-percent fs-2 text-primary"></i>


<h6 class="mt-2">
Commission Earned
</h6>


<h3 id="commissionEarned">

KES 0

</h3>


</div>


</div>


</div>








<div class="col-md-4">


<div class="card shadow-sm text-center">


<div class="card-body">


<i class="bi bi-bank fs-2 text-warning"></i>


<h6 class="mt-2">
Available Balance
</h6>


<h3 id="walletBalance">

KES 0

</h3>


</div>


</div>


</div>



</div>








<!-- Withdrawal Card -->


<div class="card shadow-sm mb-4">


<div class="card-header bg-success text-white">


<h5 class="mb-0">

Request Withdrawal

</h5>


</div>




<div class="card-body">


<form id="withdrawalForm">



<div class="row">


<div class="col-md-6 mb-3">


<label class="form-label">

M-PESA Number

</label>


<input

type="tel"

id="mpesaNumber"

class="form-control"

placeholder="07XXXXXXXX"

required>


</div>






<div class="col-md-6 mb-3">


<label class="form-label">

Amount (KES)

</label>


<input

type="number"

id="withdrawAmount"

class="form-control"

placeholder="Amount"

required>


</div>


</div>





<button class="btn btn-success">

<i class="bi bi-send"></i>

Request Withdrawal

</button>



</form>



</div>


</div>








<!-- Transactions -->


<div class="card shadow-sm">


<div class="card-header">

<h5>

Transaction History

</h5>

</div>



<div class="card-body">


<div class="table-responsive">


<table class="table table-bordered">


<thead class="table-success">


<tr>

<th>
Date
</th>


<th>
Type
</th>


<th>
Amount
</th>


<th>
Status
</th>


</tr>


</thead>



<tbody id="transactionsTable">


<tr>

<td colspan="4"
class="text-center">

Loading transactions...

</td>

</tr>


</tbody>



</table>


</div>


</div>


</div>



</div>


</div>


</div>
