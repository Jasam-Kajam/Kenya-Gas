<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Forgot Password | Kenya Gas</title>

    <meta name="description"
          content="Reset your Kenya Gas account password.">

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <!-- Custom CSS -->

    <link rel="stylesheet"
          href="assets/css/auth.css">

</head>

<body>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-6 col-xl-5">

<div class="login-card shadow-lg border-0 rounded-4">

<div class="card-body p-4 p-md-5">

<div class="text-center mb-4">

<h1 class="logo text-success">

🔥 Kenya Gas

</h1>

<h3>

Forgot Password

</h3>

<p class="text-muted">

Enter your email address and we'll send you a password reset link.

</p>

</div>

<form id="forgotPasswordForm">

<div class="mb-4">

<label
for="resetEmail"
class="form-label">

Email Address

</label>

<input
type="email"
id="resetEmail"
class="form-control"
placeholder="john@example.com"
required>

</div>

<button
id="resetBtn"
type="submit"
class="btn btn-success btn-lg w-100">

<span
id="resetSpinner"
class="spinner-border spinner-border-sm me-2 d-none">

</span>

<span id="resetText">

Send Reset Link

</span>

</button>

</form>

<hr>

<div class="text-center">

<a
href="login.html"
class="btn btn-primary w-100 mb-3">

Back to Login

</a>

<a
href="register.html"
class="btn btn-outline-success w-100">

Create New Account

</a>

</div>

</div>

</div>

</div>

</div>

</div>

<!-- Toast -->

<div class="toast-container position-fixed top-0 end-0 p-3">

<div
id="appToast"
class="toast">

<div class="toast-header">

<strong class="me-auto">

Kenya Gas

</strong>

<button
class="btn-close"
data-bs-dismiss="toast">

</button>

</div>

<div
id="toastMessage"
class="toast-body">

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script type="module" src="assets/js/forgot-password.js"></script>

</body>

</html>
