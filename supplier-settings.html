<!-- Settings Content -->


<div class="col-lg-9">


<h2 class="fw-bold mb-4">

<i class="bi bi-gear text-success"></i>

Supplier Settings

</h2>








<!-- Account Information -->


<div class="card shadow-sm mb-4">


<div class="card-header bg-success text-white">


<h5 class="mb-0">

Account Information

</h5>


</div>




<div class="card-body">


<form id="accountSettingsForm">



<div class="row">



<div class="col-md-6 mb-3">


<label class="form-label">

Full Name

</label>


<input

type="text"

id="supplierName"

class="form-control"

placeholder="Supplier name">


</div>







<div class="col-md-6 mb-3">


<label class="form-label">

Email Address

</label>


<input

type="email"

id="supplierEmail"

class="form-control"

readonly>


</div>







<div class="col-md-6 mb-3">


<label class="form-label">

Phone Number

</label>


<input

type="tel"

id="supplierPhone"

class="form-control"

placeholder="07XXXXXXXX">


</div>







<div class="col-md-6 mb-3">


<label class="form-label">

M-PESA Number

</label>


<input

type="tel"

id="mpesaNumber"

class="form-control"

placeholder="07XXXXXXXX">


</div>




</div>





<button class="btn btn-success">

<i class="bi bi-save"></i>

Save Changes

</button>



</form>


</div>


</div>








<!-- Password -->


<div class="card shadow-sm mb-4">


<div class="card-header">


<h5>

Change Password

</h5>


</div>



<div class="card-body">


<form id="passwordForm">



<label class="form-label">

Current Password

</label>


<input

type="password"

id="currentPassword"

class="form-control mb-3">






<label class="form-label">

New Password

</label>


<input

type="password"

id="newPassword"

class="form-control mb-3">






<button class="btn btn-primary">

Update Password

</button>


</form>



</div>


</div>









<!-- Notifications -->


<div class="card shadow-sm mb-4">


<div class="card-header">


<h5>

Notifications

</h5>


</div>



<div class="card-body">


<div class="form-check form-switch mb-3">


<input

class="form-check-input"

type="checkbox"

id="orderNotifications"

checked>


<label class="form-check-label">

Receive new order notifications

</label>


</div>






<div class="form-check form-switch">


<input

class="form-check-input"

type="checkbox"

id="emailNotifications"

checked>


<label class="form-check-label">

Receive email notifications

</label>


</div>



</div>


</div>









<!-- Danger Zone -->


<div class="card shadow-sm border-danger">


<div class="card-header bg-danger text-white">


<h5>

Danger Zone

</h5>


</div>



<div class="card-body">


<p>

Deleting your account is permanent.

</p>


<button

class="btn btn-danger"

id="deleteAccountBtn">


<i class="bi bi-trash"></i>

Delete Supplier Account


</button>



</div>


</div>





</div>


</div>
